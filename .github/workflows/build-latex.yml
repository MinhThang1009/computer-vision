# CI biên dịch LaTeX — fail nếu file .tex không build được sau khi sửa.
# Chỉ chạy khi report/ thay đổi để tiết kiệm thời gian Actions.
name: Build LaTeX

on:
  push:
    branches: [main]
    paths:
      - "report/**"
      - ".github/workflows/build-latex.yml"
  # PR không lọc paths: ruleset yêu cầu check build pass mới được merge,
  # nếu lọc thì PR không đụng report sẽ kẹt chờ check không bao giờ chạy
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Biên dịch report/main.tex
    steps:
      # Pin theo commit SHA để tag không thể bị move sang code khác
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # latex-action dùng TeX Live đầy đủ (có sẵn babel-vietnamese, fontenc T5);
      # latexmk tự chạy pdflatex nhiều lần để mục lục/tham chiếu cập nhật
      - uses: xu-cheng/latex-action@6549dc21effb2730855a1281407ecfcececc6c1b # v4.1.0
        with:
          root_file: main.tex
          working_directory: report
